<body>

    <div class="theater-shadows"></div>
    <div class="projector-beam"></div>

    <div class="marquee-box">
        <div class="clausurado-tag">Fuera de Cartelera</div>
        
        <h1>Película y series No Disponible</h1>
        
        <p>
            Esta cinta ha sido retirada de las salas o confiscada por el servidor. Las imágenes ya no existen en nuestros archivos... o quizás decidimos que era demasiado peligroso dejar que las siguieras viendo.
        </p>

        <a href="/" class="btn-exit">Volver al Vestíbulo</a>
    </div>

    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: #08080a;
            color: #e2e8f0;
            font-family: 'Impact', 'Arial Black', sans-serif;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            position: relative;
        }

        /* Fondo de sala oscura */
        .theater-shadows {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle, rgba(20, 20, 25, 0) 40%, rgba(0, 0, 0, 0.95) 100%);
            z-index: 1;
        }

        /* Cartelera / Contenedor */
        .marquee-box {
            background: #0f0f12;
            border: 4px solid #1a1a22;
            padding: 50px 30px;
            max-width: 520px;
            width: 90%;
            text-align: center;
            position: relative;
            z-index: 2;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.7);
        }

        /* Letrero de Advertencia Estilo Sello o Neón Fundido */
        .clausurado-tag {
            font-size: 1.1rem;
            color: #4a0404; /* Color sangre seca / apagado */
            text-transform: uppercase;
            letter-spacing: 5px;
            border: 3px solid #4a0404;
            display: inline-block;
            padding: 8px 20px;
            margin-bottom: 30px;
            transform: rotate(-3deg); /* Efecto de cartel chueco o sello */
            font-weight: bold;
            animation: neon-flicker 4s infinite linear;
        }

        h1 {
            font-size: 2.5rem;
            color: #f3f4f6;
            letter-spacing: 2px;
            margin-bottom: 20px;
            text-transform: uppercase;
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.1);
        }

        /* Texto explicativo en fuente monospace para contraste */
        p {
            font-family: 'Courier New', Courier, monospace;
            color: #94a3b8;
            font-size: 0.95rem;
            line-height: 1.6;
            margin-bottom: 40px;
            font-weight: normal;
        }

        /* Botón estilo cartelera de salida */
        .btn-exit {
            display: inline-block;
            background-color: transparent;
            color: #94a3b8;
            border: 1px solid #3f3f46;
            padding: 12px 30px;
            font-family: 'Courier New', Courier, monospace;
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            cursor: pointer;
            text-decoration: none;
            transition: all 0.3s ease;
        }

        .btn-exit:hover {
            border-color: #ef4444;
            color: #ef4444;
            box-shadow: 0 0 15px rgba(239, 68, 68, 0.2);
            background: rgba(239, 68, 68, 0.05);
        }

        /* Luz de proyector parpadeante al fondo */
        .projector-beam {
            position: absolute;
            top: -50%;
            left: 50%;
            width: 200px;
            height: 200%;
            background: linear-gradient(to bottom, rgba(255,255,255,0.03), transparent);
            transform: translateX(-50%) rotate(45deg);
            z-index: 1;
            pointer-events: none;
            transform-origin: top center;
            animation: beam-move 8s infinite ease-in-out;
        }

        /* Animaciones de suspenso */
        @keyframes neon-flicker {
            0%, 18%, 22%, 25%, 53%, 57%, 100% {
                color: #ef4444;
                border-color: #ef4444;
                text-shadow: 0 0 10px rgba(239, 68, 68, 0.5);
                box-shadow: inset 0 0 10px rgba(239, 68, 68, 0.2), 0 0 10px rgba(239, 68, 68, 0.2);
            }
            20%, 24%, 55% {
                color: #3f0707;
                border-color: #3f0707;
                text-shadow: none;
                box-shadow: none;
            }
        }

        @keyframes beam-move {
            0%, 100% { transform: translateX(-50%) rotate(43deg); opacity: 0.5; }
            50% { transform: translateX(-50%) rotate(47deg); opacity: 0.8; }
        }
    </style>
</body>
