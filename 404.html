        <span class="badge">ERROR DE TRANSMISIÓN</span>

        <h2>Esta escena fue eliminada del guión</h2>

    <style>
        * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
}

body {
    background-color: #0b0c10;
    color: #ffffff;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    width: 100vw;
    overflow: hidden;
    position: relative;
}

/* Fondo sutil degradado estilo cine premium */
.streaming-bg {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: radial-gradient(circle at center, #1f1f2e 0%, #0b0c10 70%);
    z-index: 1;
    opacity: 0.8;
}

.error-box {
    position: relative;
    z-index: 2;
    text-align: center;
    padding: 40px 20px;
    max-width: 600px;
    width: 100%;
}

.badge {
    display: inline-block;
    background-color: rgba(229, 9, 20, 0.15);
    color: #e50914;
    border: 1px solid #e50914;
    padding: 6px 12px;
    font-size: 0.75rem;
    font-weight: 700;
    letter-spacing: 2px;
    border-radius: 4px;
    margin-bottom: 20px;
    text-transform: uppercase;
}

.error-box h1 {
    font-size: 9rem;
    font-weight: 800;
    color: #ffffff;
    line-height: 1;
    letter-spacing: -2px;
    margin-bottom: 10px;
    text-shadow: 0px 4px 20px rgba(229, 9, 20, 0.4);
}

.error-box h2 {
    font-size: 2.2rem;
    font-weight: 700;
    color: #ffffff;
    margin-bottom: 15px;
}

.error-box p {
    font-size: 1.1rem;
    color: #9ca3af;
    margin-bottom: 35px;
    line-height: 1.6;
}

.actions {
    display: flex;
    gap: 15px;
    justify-content: center;
    flex-wrap: wrap;
}

.btn-primary {
    background-color: #e50914;
    color: #ffffff;
    text-decoration: none;
    padding: 14px 28px;
    border-radius: 4px;
    font-weight: 600;
    font-size: 1rem;
    transition: background-color 0.2s ease, transform 0.2s ease;
    box-shadow: 0 4px 15px rgba(229, 9, 20, 0.4);
}

.btn-primary:hover {
    background-color: #b80710;
    transform: translateY(-2px);
}

.btn-secondary {
    background-color: rgba(255, 255, 255, 0.1);
    color: #ffffff;
    text-decoration: none;
    padding: 14px 28px;
    border-radius: 4px;
    font-weight: 600;
    font-size: 1rem;
    border: 1px solid rgba(255, 255, 255, 0.2);
    transition: background-color 0.2s ease, transform 0.2s ease;
}

.btn-secondary:hover {
    background-color: rgba(255, 255, 255, 0.2);
    transform: translateY(-2px);
}

/* Responsivo para móviles */
@media (max-width: 480px) {
    .error-box h1 { font-size: 6rem; }
    .error-box h2 { font-size: 1.6rem; }
    .actions { flex-direction: column; gap: 10px; }
    .btn-primary, .btn-secondary { width: 100%; }
}

    </style>
</body>
